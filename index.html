<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; background: #111; color: #f0e6d0;
  font-family: Georgia, serif; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
#splash {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #111; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px;
  padding: 48px 32px; z-index: 200;
}
#splash h1 { font-size: 60px; font-weight: normal; letter-spacing: -1px; }
#splash p { font-size: 16px; line-height: 1.65; color: rgba(240,230,208,0.5); text-align: center; max-width: 280px; font-family: -apple-system, sans-serif; }
#splash-btn {
  background: #c8781a; color: #111; border: none; border-radius: 14px;
  padding: 20px 52px; font-size: 16px; font-family: -apple-system, sans-serif;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
}
#camera-wrap { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: none; }
#video { width: 100%; height: 100%; object-fit: cover; }
#top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: env(safe-area-inset-top, 28px) 20px 14px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
  z-index: 20; display: none; align-items: center; justify-content: center;
}
#app-title { font-size: 22px; font-weight: normal; }
#bubble {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 16px) + 160px);
  left: 16px; right: 16px;
  background: rgba(0,0,0,0.78); border-left: 4px solid #c8781a;
  border-radius: 0 14px 14px 0; padding: 16px 20px;
  font-size: 20px; line-height: 1.45; color: #f0e6d0;
  z-index: 20; display: none;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
#controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 14px 20px calc(env(safe-area-inset-bottom, 16px) + 14px);
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  z-index: 20; display: none; flex-direction: column; gap: 10px; align-items: center;
}
#mode-label {
  font-size: 11px; font-family: -apple-system, sans-serif;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(240,230,208,0.35); text-align: center;
}
#btn-row { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; }
.btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: rgba(240,230,208,0.07); border: 1px solid rgba(240,230,208,0.13);
  border-radius: 16px; padding: 13px 16px; color: #f0e6d0;
  font-family: -apple-system, sans-serif; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; min-width: 64px;
}
.btn svg { width: 22px; height: 22px; }
.btn:active { opacity: 0.55; }
.btn.on { background: rgba(200,120,26,0.2); border-color: #c8781a; color: #c8781a; }
.btn-primary {
  background: #c8781a; border-color: #c8781a; color: #111;
  min-width: 88px; padding: 16px 20px;
}
.btn-primary svg { width: 26px; height: 26px; }
.btn-primary:active { background: #a3601a; }
#flash { position: fixed; top:0;left:0;right:0;bottom:0; background:#fff; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.06s; }
#flash.on { opacity:1; }
#processing { position:fixed;top:0;left:0;right:0;bottom:0; background:rgba(10,8,5,0.9); z-index:80; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
#processing.show { display:flex; }
.spinner { width:52px;height:52px; border:3px solid rgba(240,230,208,0.1); border-top-color:#c8781a; border-radius:50%; animation:spin 0.9s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#proc-text { font-size:18px; color:rgba(240,230,208,0.6); }
#toast {
  position:fixed; top:calc(env(safe-area-inset-top,24px) + 56px); left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:rgba(0,0,0,0.85); border:1px solid rgba(200,120,26,0.4);
  border-radius:24px; padding:9px 20px; font-size:12px;
  font-family:-apple-system,sans-serif; color:#c8781a;
  letter-spacing:0.08em; text-transform:uppercase; z-index:90;
  transition:transform 0.35s ease; white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); }
#drawer { position:fixed;top:0;left:0;right:0;bottom:0; z-index:60; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.3,0.7,0,1); }
#drawer.open { transform:translateY(0); }
#drawer-bg { position:absolute;top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
#drawer-sheet { position:absolute;bottom:0;left:0;right:0; background:#1a1510; border-radius:20px 20px 0 0; border-top:1px solid rgba(200,120,26,0.2); max-height:78vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom,16px); }
#drawer-handle { width:36px;height:4px; background:rgba(240,230,208,0.15); border-radius:2px; margin:14px auto 16px; flex-shrink:0; }
#drawer-head { display:flex;justify-content:space-between;align-items:center; padding:0 20px 14px; border-bottom:1px solid rgba(240,230,208,0.07); flex-shrink:0; }
#drawer-head span { font-size:19px; font-weight:normal; }
#drawer-close { background:none;border:none; color:#c8781a; font-size:12px; font-family:-apple-system,sans-serif; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; padding:4px; }
#drawer-body { padding:16px 20px; overflow-y:auto; flex:1; font-size:15px; line-height:1.8; color:rgba(240,230,208,0.7); white-space:pre-wrap; -webkit-overflow-scrolling:touch; }
</style>
</head>
<body>

<div id="splash">
  <h1>Reader</h1>
  <p>Point your camera at any document and tap Read. Then ask questions by voice.</p>
  <button id="splash-btn">Open Reader</button>
  <p style="font-size:12px;font-family:-apple-system,sans-serif;color:rgba(240,230,208,0.22);text-align:center;">Requires camera and microphone</p>
</div>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
</div>

<div id="top-bar">
  <span id="app-title">Reader</span>
</div>

<div id="bubble"></div>

<div id="controls">
  <div id="mode-label">Ready</div>
  <div id="btn-row">
    <button class="btn" id="btn-multi" onclick="toggleMulti()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="4" width="8" height="14" rx="1.5"/>
        <rect x="14" y="4" width="8" height="14" rx="1.5"/>
      </svg>
      Multi
    </button>
    <button class="btn btn-primary" onclick="captureFrame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
        <path d="M9 2h6l1.5 2.5H20a2 2 0 012 2v13a2 2 0 01-2 2H4a2 2 0 01-2-2V6.5a2 2 0 012-2h3.5L9 2z"/>
      </svg>
      Read
    </button>
    <button class="btn" onclick="openDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="16" y2="17"/>
      </svg>
      Doc
    </button>
    <button class="btn" onclick="clearAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      Clear
    </button>
  </div>
</div>

<div id="flash"></div>
<div id="processing"><div class="spinner"></div><p id="proc-text">Reading...</p></div>
<div id="toast"></div>

<div id="drawer">
  <div id="drawer-bg" onclick="closeDrawer()"></div>
  <div id="drawer-sheet">
    <div id="drawer-handle"></div>
    <div id="drawer-head">
      <span>Document</span>
      <button id="drawer-close" onclick="closeDrawer()">Done</button>
    </div>
    <div id="drawer-body">No document captured yet.</div>
  </div>
</div>

<script>
'use strict';

var WORKER_URL   = 'https://ireader.dnotwicz.workers.dev';
var pages        = [];
var convHistory  = [];
var multiMode    = false;
var isProcessing = false;
var lastSpoken   = '';
var recog        = null;
var isListening  = false;
var bubbleTimer  = null;
var toastTimer   = null;

var video    = document.getElementById('video');
var bubble   = document.getElementById('bubble');
var modeLbl  = document.getElementById('mode-label');
var procText = document.getElementById('proc-text');
var btnMulti = document.getElementById('btn-multi');

document.getElementById('splash-btn').addEventListener('click', startApp);

function startApp() {
  navigator.mediaDevices.getUserMedia({ video: false, audio: true })
    .then(function(s) { s.getTracks().forEach(function(t){t.stop();}); })
    .catch(function(){})
    .then(function() {
      return navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' }, width:{ideal:3840}, height:{ideal:2160} },
        audio: false
      });
    })
    .catch(function() {
      return navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' }, audio:false });
    })
    .catch(function() {
      return navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    })
    .then(function(stream) {
      video.srcObject = stream;
      return video.play();
    })
    .then(function() {
      document.getElementById('splash').style.display      = 'none';
      document.getElementById('camera-wrap').style.display = 'block';
      document.getElementById('top-bar').style.display     = 'flex';
      document.getElementById('controls').style.display    = 'flex';
      setMode('Ready — tap Read to capture');
      setTimeout(function() {
        speak('Reader is ready. Point the camera at a document and tap Read.');
        startListening();
      }, 600);
    })
    .catch(function() {
      alert('Camera access is required. Tap Allow when Chrome asks, then reload the page.');
    });
}

// SPEECH OUT
function speak(text, onDone) {
  if (!text) return;
  lastSpoken = text;
  var synth = window.speechSynthesis;
  synth.cancel();
  showBubble(text);
  setTimeout(function() {
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang='en-US'; utt.rate=0.88; utt.pitch=1.0; utt.volume=1.0;
    var voices = synth.getVoices();
    var voice = null;
    for (var i=0;i<voices.length;i++) { if (voices[i].name==='Google US English'){voice=voices[i];break;} }
    if (!voice) for (var i=0;i<voices.length;i++) { if (/google/i.test(voices[i].name)&&/^en/.test(voices[i].lang)){voice=voices[i];break;} }
    if (!voice) for (var i=0;i<voices.length;i++) { if (/^en/.test(voices[i].lang)){voice=voices[i];break;} }
    if (voice) utt.voice = voice;
    utt.onend  = function() { hideBubbleSoon(); if(onDone) onDone(); };
    utt.onerror = function() { hideBubbleSoon(); };
    synth.speak(utt);
  }, 100);
}

function showBubble(text) { clearTimeout(bubbleTimer); bubble.textContent=text; bubble.style.display='block'; }
function hideBubbleSoon() { bubbleTimer=setTimeout(function(){ bubble.style.display='none'; },9000); }

// SPEECH IN
function startListening() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not supported in this browser'); return; }
  if (recog) { try { recog.abort(); } catch(e){} }
  recog = new SR();
  recog.continuous=true; recog.interimResults=false; recog.lang='en-US';
  recog.onstart  = function() { isListening=true; };
  recog.onend    = function() { isListening=false; if(!isProcessing) setTimeout(startListening,800); };
  recog.onerror  = function(e) {
    isListening=false;
    if (e.error==='not-allowed') { showToast('Mic blocked — check Chrome permissions'); return; }
    if (e.error!=='no-speech')   { setTimeout(startListening,1200); }
  };
  recog.onresult = function(e) {
    var last=e.results[e.results.length-1];
    if (last.isFinal) handleCommand(last[0].transcript.trim().toLowerCase());
  };
  try { recog.start(); } catch(e) { setTimeout(startListening,1000); }
}

// COMMANDS
function handleCommand(t) {
  if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); return; }
  if (/\bread( this| it)?\b|\bscan( this)?\b|\bcapture\b/.test(t)) { captureFrame(); return; }
  if (/multiple pages?|multi.?page/.test(t))  { if (!multiMode) toggleMulti(); return; }
  if (/\bdone\b/.test(t) && multiMode)         { finishMulti(); return; }
  if (/\bnext\b/.test(t) && multiMode)         { captureFrame(); return; }
  if (/\bsummar/.test(t))                      { doSummarize(); return; }
  if (/\brepeat\b|\bagain\b/.test(t))          { speak(lastSpoken); return; }
  if (/\bclear\b|\breset\b|new doc/.test(t))   { clearAll(); return; }
  if (convHistory.length>0 && t.length>3)      { askQuestion(t); }
}

// CAPTURE
function captureFrame() {
  if (isProcessing) { showToast('Still working...'); return; }
  var flash=document.getElementById('flash');
  flash.classList.add('on'); setTimeout(function(){flash.classList.remove('on');},80);
  var canvas=document.createElement('canvas');
  var maxW=1920; var maxH=1080;
  var vw=video.videoWidth||1280; var vh=video.videoHeight||720;
  var scale=Math.min(1, maxW/vw, maxH/vh);
  canvas.width=Math.round(vw*scale); canvas.height=Math.round(vh*scale);
  canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
  var b64=canvas.toDataURL('image/jpeg',0.82).split(',')[1];
  isProcessing=true; showProc('Reading your document...'); setMode('Reading...');
  var pageNum=pages.length+1;
  ocrWithClaude(b64,pageNum)
    .then(function(r) {
      pages.push({text:r.text,summary:r.summary,overview:r.overview});
      hideProc();
      if (multiMode) { setMode('Page '+pageNum+' done — say Next or Done'); speak('Page '+pageNum+' captured.'); }
      else           { buildContext(); setMode('Ask me anything'); speak(r.overview); }
      isProcessing=false;
    })
    .catch(function(err) { hideProc(); speak('I had trouble reading that. Please try again.'); setMode('Error: '+(err&&err.message||'unknown')); isProcessing=false; });
}

// OCR
function ocrWithClaude(b64, pageNum) {
  var prompt = 'You are an expert OCR assistant for someone with limited vision. Page '+pageNum+'.\n\n'
    +'CRITICAL: Find and transcribe EVERY word visible in this image.\n'
    +'- Scan from the center outward in all directions until you have found all text\n'
    +'- Correct for any tilt, angle, rotation, or perspective distortion\n'
    +'- Read through shadows, glare, and uneven lighting\n'
    +'- Include text near or at the edges even if partially visible\n'
    +'- Preserve layout: headings, columns, lists, line breaks\n'
    +'- Do NOT skip any text. Do NOT summarize instead of transcribing.\n\n'
    +'Respond ONLY as raw JSON, no markdown, no backticks:\n'
    +'{"text":"complete word-for-word transcription","overview":"one natural spoken sentence with document type and date if visible","summary":"1 to 3 spoken sentences on key facts — amounts due, actions needed — spell out all numbers and dates as words"}';
  return fetch(WORKER_URL, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-opus-4-6', max_tokens:2500,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:prompt}
      ]}]
    })
  })
  .then(function(r){
    return r.json().then(function(d){
      if(!r.ok) throw new Error('HTTP '+r.status+': '+(d&&d.error&&d.error.message||JSON.stringify(d)));
      return d;
    });
  })
  .then(function(data){
    var raw=(data.content&&data.content[0])?data.content[0].text:'';
    try {
      var p=JSON.parse(raw.replace(/```json|```/g,'').trim());
      return {text:p.text||raw, summary:p.summary||'Document captured.', overview:p.overview||p.summary||'Okay. Document captured.'};
    } catch(e) { return {text:raw,summary:'Document captured.',overview:'Okay. Document captured.'}; }
  });
}

// CONVERSATION
function buildContext() {
  var allText=pages.map(function(p,i){return '=== PAGE '+(i+1)+' ===\n'+p.text;}).join('\n\n');
  convHistory=[
    {role:'user',content:'Here is the full text of a scanned document:\n\n'+allText},
    {role:'assistant',content:'I have read and saved this document. Ready for your questions.'}
  ];
  document.getElementById('drawer-body').textContent=allText;
}

function askQuestion(q) {
  if (convHistory.length===0) { speak('Please capture a document first. Tap Read.'); return; }
  isProcessing=true; showBubble('Thinking...'); showProc('Thinking...');
  convHistory.push({role:'user',content:q});
  fetch(WORKER_URL, {method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-opus-4-6',max_tokens:512,
      system:'You are a reading assistant for someone with limited vision. Answer in 1 to 3 short natural spoken sentences. No markdown. Spell out all dollar amounts, phone numbers, and dates as words. If the answer is not in the document say so.',
      messages:convHistory.slice(-8)
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var reply=(data.content&&data.content[0])?data.content[0].text:"I am not sure. Try asking differently.";
    convHistory.push({role:'assistant',content:reply});
    hideProc(); speak(reply); isProcessing=false;
  })
  .catch(function(){ hideProc(); speak('Connection issue. Please try again.'); isProcessing=false; });
}

// MULTI
function toggleMulti() {
  multiMode=!multiMode;
  if (multiMode) { btnMulti.classList.add('on'); pages=[];convHistory=[]; document.getElementById('drawer-body').textContent='No document captured yet.'; setMode('Multi-page — tap Read for each page'); speak('Multi-page mode on. Tap Read for each page, then say done when finished.'); }
  else           { btnMulti.classList.remove('on'); setMode('Ready'); }
}
function finishMulti() {
  multiMode=false; btnMulti.classList.remove('on'); buildContext();
  var n=pages.length;
  setMode(n+' page'+(n>1?'s':'')+' captured');
  speak(n+' page'+(n>1?'s':'')+' captured. '+pages.map(function(p,i){return 'Page '+(i+1)+': '+p.overview;}).join(' '));
}
function doSummarize() {
  if (pages.length===0){speak('No document yet. Tap Read to capture one.');return;}
  speak(pages.map(function(p,i){return pages.length>1?'Page '+(i+1)+': '+p.summary:p.summary;}).join(' '));
}
function clearAll() {
  pages=[];convHistory=[]; document.getElementById('drawer-body').textContent='No document captured yet.';
  setMode('Ready'); speak('Cleared. Ready for a new document.');
}

function openDrawer()  { document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
function setMode(t)    { modeLbl.textContent=t; }
function showProc(t)   { procText.textContent=t; document.getElementById('processing').classList.add('show'); }
function hideProc()    { document.getElementById('processing').classList.remove('show'); }
function showToast(msg) {
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.classList.remove('show');},3000);
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  window.speechSynthesis.getVoices();
}
document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
</script>
</body>
</html>
